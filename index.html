    }

    // Genera el HTML de una celda de contenido clickeable: al tocarla, reproduce
    // el audio de su texto en el idioma correspondiente. Escapa comillas para
    // que textos como "j'avais" no rompan el atributo onclick. Si el texto tiene
    // una aclaración entre paréntesis al final (ej. "le (masc.)"), se muestra
    // completo pero solo se pronuncia la parte real de la palabra ("le"). Si el
    // texto usa paréntesis para marcar una parte OPCIONAL pero pronunciable (ej.
    // "(o) meu", donde el artículo es opcional en portugués), se pronuncia todo
    // el texto igual, solo sin los símbolos "(" ")" (es decir, "o meu").
    // colorInline es opcional: para TIEMPOS VERBALES, pinta la conjugación con el
    // mismo color del tiempo verbal (ej. rojo para Plus que parfait). traduccion
    // es opcional: si viene, se agrega debajo del texto en gris chico (misma
    // clase que ya se usa para la traducción en el menú de unidades), sin afectar
    // la pronunciación (que sigue siendo solo del texto principal).
    function celdaSonido(texto, idioma, claseExtra, colorInline, traduccion) {
        const textoVisible = String(texto);
        const esAclaracionFinal = /\s*\([^)]*\)\s*$/.test(textoVisible);
        const textoApronunciar = esAclaracionFinal
            ? (textoVisible.replace(/\s*\([^)]*\)\s*$/, '').trim() || textoVisible)
            : textoVisible.replace(/[()]/g, '').replace(/\s+/g, ' ').trim();
        const textoEscapado = textoApronunciar.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
        const clase = claseExtra ? `celda-sonido ${claseExtra}` : "celda-sonido";
        const estilo = colorInline ? ` style="color: ${colorInline};"` : "";
        const traduccionHtml = traduccion ? `<div class="traduccion-unidad">${traduccion}</div>` : "";
        return `<td class="${clase}"${estilo} onclick="reproducirSonido('${textoEscapado}', '${idioma}')">${textoVisible}${traduccionHtml}</td>`;
    }

    // Renderiza la unidad COLORES (formato especial: columna de emoji + 4 formas de adjetivo)
    function renderColores(idioma) {
        let html = "<table class=\"tabla-colores\"><caption>Colores</caption><tr><th></th><th>Masc. S</th><th>Masc. P</th><th>Fem. S</th><th>Fem. P</th></tr>";
        COLORES_NUEVO_POR_IDIOMA[idioma].forEach(item => {
            const emoji = emojiMap[item.esp] || "";
            html += "<tr>";
            html += `<td class="emoji-cell">${emoji}</td>`;
            html += celdaSonido(item.mSing, idioma);
            html += celdaSonido(item.mPlur, idioma);
            html += celdaSonido(item.fSing, idioma);
            html += celdaSonido(item.fPlur, idioma);
            html += "</tr>";
        });
        html += "</table>";
        return html;
    }

    // Dibuja el contenido de una sola tabla a partir de {headers, rows, titulo opcional}.
    // Si tablaData.vacia es true, devuelve solo el texto del placeholder de referencia.
    // Por defecto, todas las columnas tienen sonido salvo la primera (típicamente un
    // número o ícono). Si tablaData.columnasConSonido es un array de índices (ej. [0, 1]),
    // solo esas columnas llevan sonido — útil cuando alguna columna es la traducción al
    // español y no debe pronunciarse con la voz del idioma de estudio.
    // Para el color por género/número hay dos formas, según si el género es fijo por
    // columna o depende de la fila:
    // - tablaData.colorPorColumna: array paralelo a las columnas (índice → clase o null).
    // - tablaData.colorPorCelda: función (fila, indiceColumna) => clase o null; tiene
    //   prioridad sobre colorPorColumna si está definida. Útil cuando, por ejemplo, la
    //   fila 0 es "Masc." y la fila 1 es "Fem." en la misma columna.
    function renderTabla(tablaData, idioma) {
        if (tablaData.vacia) {
            return tablaData.titulo || "";
        }

        const columnasConSonido = Array.isArray(tablaData.columnasConSonido) ? tablaData.columnasConSonido : null;
        const colorPorColumna = Array.isArray(tablaData.colorPorColumna) ? tablaData.colorPorColumna : null;
        const colorPorCelda = typeof tablaData.colorPorCelda === "function" ? tablaData.colorPorCelda : null;
        // Si la tabla pide traducirDebajo, cada celda con sonido puede traer su
        // traducción al español separada por "||" (ej. "moi||yo") — se muestra
        // el pronombre arriba y la traducción en gris chico debajo, sin afectar
        // la pronunciación (que sigue siendo solo de la parte antes de "||").
        const traducirDebajo = tablaData.traducirDebajo === true;
        let html = "<table>";
        if (tablaData.titulo) {
            html += `<caption>${tablaData.titulo}</caption>`;
        }
        html += "<tr>";
        tablaData.headers.forEach(h => { html += `<th>${h}</th>`; });
        html += "</tr>";
        tablaData.rows.forEach((fila, indiceFila) => {
            html += "<tr>";
            fila.forEach((celda, i) => {
                const conSonido = columnasConSonido ? columnasConSonido.includes(i) : (i !== 0);
                const claseGenero = colorPorCelda ? colorPorCelda(fila, i, indiceFila) : (colorPorColumna ? colorPorColumna[i] : null);
                if (conSonido && traducirDebajo && String(celda).includes("||")) {
                    const [texto, traduccion] = String(celda).split("||");
                    html += celdaSonido(texto, idioma, claseGenero, null, traduccion);
                } else {
                    html += conSonido ? celdaSonido(celda, idioma, claseGenero) : `<td class="${claseGenero || ''}">${celda}</td>`;
                }
            });
            html += "</tr>";
        });
        html += "</table>";
        return html;
    }

    // Color de cada tiempo verbal, según el código de colores manuscrito de la persona.
    // Se mapea por POSICIÓN en el array (0 a 7), porque ese orden es el mismo para
    // cualquier verbo: Plus que parfait, Passé composé, Imparfait, Cond. passé,
    // Présent, Futur proche, Futur simple, Cond. présent — sin importar el verbo.
    const colorPorPosicionTiempo = [
        "#d63b2f", // 0: Plus que parfait → rojo
        "#e8821e", // 1: Passé composé → naranja
        "#e8c91e", // 2: Imparfait → amarillo
        "#e85ca8", // 3: Conditionnel passé → rosa
        "#3a3a3a", // 4: Présent → gris/negro
        "#4caf3a", // 5: Futur proche → verde
        "#2f7fe0", // 6: Futur simple → azul
        "#7b3fd6"  // 7: Conditionnel présent → violeta
    ];

    // Renderiza TIEMPOS VERBALES: 8 tarjetas fijas en grilla 4x2, sin scroll.
    // Cada tarjeta: nombre del tiempo, función (ej. "yo agarro", estilo nota a lápiz),
    // tabla de 6 pronombres (sin color) + conjugación (coloreada con el color del
    // tiempo verbal, igual que el título), regla.
    function renderTiemposVerbales(idioma) {
        const tiempos = data[idioma]["TIEMPOS VERBALES"];
        let html = '<div class="tarjetas-grid-tiempos">';
        tiempos.forEach((t, i) => {
            const color = colorPorPosicionTiempo[i] || "#888";
            const estiloBorde = `border-color: ${color}; box-shadow: 0 0 8px ${color}59, 0 3px 8px rgba(0,0,0,0.05);`;
            html += `<div class="tarjeta-tiempo tarjeta-con-borde" style="${estiloBorde}">`;
            html += `<div class="tarjeta-tiempo-header"><div class="tarjeta-tiempo-nombre" style="color: ${color};">${t.tiempo}</div><div class="tarjeta-tiempo-funcion">${t.funcion.toLowerCase()}</div></div>`;
            html += "<table>";
            t.filas.forEach(fila => {
                html += `<tr><td class="pronombre-cell">${fila[0]}</td>${celdaSonido(fila[1], idioma, null, color)}</tr>`;
            });
            html += "</table>";
            if (t.regla) {
                html += `<div class="tarjeta-tiempo-regla">${t.regla}</div>`;
            }
            html += "</div>";
        });
        html += "</div>";
        return html;
    }

    // Renderiza las 3 tarjetas de un auxiliar (Imparfait/Présent/Conditionnel o
    // equivalentes): mismo formato visual que TIEMPOS VERBALES, pero el color de
    // la conjugación sigue la regla de pares origen→destino del apunte original
    // (ej. amarillo→rojo en Imparfait), no el color por posición. Cuando t.grupo
    // es null (no aplica esa regla, ej. en portugués o en ALLER/IR de muestra),
    // la conjugación se muestra sin color especial.
    // Renderiza las tarjetas de un auxiliar (Plus-que-parfait, Passé composé, etc.):
    // MISMO formato y MISMOS colores que renderTiemposVerbales (color por posición,
    // 0 a 7), para que ambas unidades se vean visualmente consistentes. La regla de
    // "qué tiempo simple usa cada tiempo compuesto" vive solo en la tarjeta de
    // Reglas — acá no hay flecha ni color especial por grupo.
    // Si tiempos[i] es null (ese tiempo no existe en este idioma, ej. Futur proche
    // en italiano), se dibuja una tarjeta vacía en esa posición para que la grilla
    // 4x2 quede siempre completa y en el mismo orden entre idiomas.
    function renderTiemposAuxiliar(idioma) {
        const tiempos = data[idioma]["VERBOS AUXILIARES"];
        let html = '<div class="tarjetas-grid-tiempos">';
        tiempos.forEach((t, i) => {
            if (!t) {
                html += '<div class="tarjeta-tiempo tarjeta-tiempo-vacia">No existe en este idioma</div>';
                return;
            }
            const color = colorPorPosicionTiempo[i] || "#888";
            html += '<div class="tarjeta-tiempo tarjeta-con-borde">';
            html += `<div class="tarjeta-tiempo-header"><div class="tarjeta-tiempo-nombre" style="color: ${color};">${t.tiempo}</div><div class="tarjeta-tiempo-funcion">${t.funcion}</div></div>`;
            html += "<table>";
            t.filas.forEach(fila => {
                html += `<tr><td class="pronombre-cell">${fila[0]}</td>${celdaSonido(fila[1], idioma, null, color)}</tr>`;
            });
            html += "</table>";
            if (t.regla) {
                html += `<div class="tarjeta-tiempo-regla">${t.regla}</div>`;
            }
            html += "</div>";
        });
        html += "</div>";
        return html;
    }


    // Dibuja un reloj analógico en SVG para una hora/minuto dado, con una
    // etiqueta debajo (ej. "3:15"). Las manecillas se calculan por trigonometría
    // simple: 12 = arriba (ángulo -90°), avanzando en sentido horario.
    function renderRelojSVG(hora, minuto, etiqueta) {
        const cx = 50, cy = 50, rEsfera = 45;
        const anguloMinutero = (minuto / 60) * 360 - 90;
        const anguloHorario = ((hora % 12) / 12) * 360 + (minuto / 60) * 30 - 90;
        const puntaMinutero = {
            x: cx + 32 * Math.cos(anguloMinutero * Math.PI / 180),
            y: cy + 32 * Math.sin(anguloMinutero * Math.PI / 180)
        };
        const puntaHorario = {
            x: cx + 20 * Math.cos(anguloHorario * Math.PI / 180),
            y: cy + 20 * Math.sin(anguloHorario * Math.PI / 180)
        };
        // 12 marcas (una por hora) alrededor de la esfera.
        let marcas = "";
        for (let i = 0; i < 12; i++) {
            const ang = (i / 12) * 360 - 90;
            const x1 = cx + 40 * Math.cos(ang * Math.PI / 180);
            const y1 = cy + 40 * Math.sin(ang * Math.PI / 180);
            const x2 = cx + 44 * Math.cos(ang * Math.PI / 180);
            const y2 = cy + 44 * Math.sin(ang * Math.PI / 180);
            marcas += `<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="var(--color-idioma)" stroke-width="1.5"/>`;
        }
        return `
            <div class="reloj-wrap">
                <svg viewBox="0 0 100 100" class="reloj-svg">
                    <circle cx="${cx}" cy="${cy}" r="${rEsfera}" fill="var(--panel-bg)" stroke="var(--color-idioma)" stroke-width="2.5"/>
                    ${marcas}
                    <line x1="${cx}" y1="${cy}" x2="${puntaHorario.x.toFixed(1)}" y2="${puntaHorario.y.toFixed(1)}" stroke="var(--color-idioma)" stroke-width="4" stroke-linecap="round"/>
                    <line x1="${cx}" y1="${cy}" x2="${puntaMinutero.x.toFixed(1)}" y2="${puntaMinutero.y.toFixed(1)}" stroke="var(--color-idioma)" stroke-width="2.5" stroke-linecap="round"/>
                    <circle cx="${cx}" cy="${cy}" r="3" fill="var(--color-idioma)"/>
                </svg>
                <div class="reloj-etiqueta">${etiqueta}</div>
            </div>`;
    }

    // Tarjeta visual de relojes: 6 ejemplos (en punto, y cuarto, y media, menos
    // cuarto, mediodía, medianoche) traducidos a la frase real de cada idioma —
    // para VER la posición de las agujas junto con la frase que la describe.
    function renderTarjetaRelojes(idioma) {
        const ejemplos = {
            "FRANCÉS": [
                [3, 0, "Il est trois heures"], [3, 15, "Il est trois heures et quart"],
                [3, 30, "Il est trois heures et demie"], [3, 45, "Il est quatre heures moins le quart"],
                [12, 0, "Il est midi"], [0, 0, "Il est minuit"]
            ],
            "ITALIANO": [
                [3, 0, "Sono le tre"], [3, 15, "Sono le tre e un quarto"],
                [3, 30, "Sono le tre e mezza"], [3, 45, "Sono le quattro meno un quarto"],
                [12, 0, "È mezzogiorno"], [0, 0, "È mezzanotte"]
            ],
            "PORTUGUÉS": [
                [3, 0, "São três horas"], [3, 15, "São três e um quarto"],
                [3, 30, "São três e meia"], [3, 45, "É um quarto para as quatro"],
                [12, 0, "É meio-dia"], [0, 0, "É meia-noite"]
            ]
        };
        let html = '<div class="tarjeta-relojes"><div class="relojes-titulo">Relojes</div><div class="relojes-grid">';
        ejemplos[idioma].forEach(([h, m, frase]) => {
            html += renderRelojSVG(h, m, frase);
        });
        html += '</div></div>';
        return html;
    }

    // Dibuja una tarjeta de NÚMEROS: solo filas de número + palabra, sin título ni encabezados.
    function renderTablaNumero(tablaData, idioma) {
        let html = '<div class="numero-tabla-wrap"><table>';

    // VOCABULARIO: 9 temas, pero ahora se ven de UNO por vez en una sola tarjeta
    // grande que ocupa toda la pantalla (selector de tema al lado del nombre de

    // artículo real de cada palabra (le/la, il/la/lo, o/a) — cuando el artículo

    // Toma una tarjeta con palabras marcadas "#masc"/"#fem" (o detectables por
    // artículo real) y devuelve una copia lista para renderTabla: colorPorCelda
    // calculado ANTES de limpiar la marca, y las celdas ya limpias para mostrar
    // y pronunciar. Reusada por GEOGRAFÍA (palabras sueltas con artículo, mismo
    // patrón de datos).
    // Extrae la parte "real" de una celda para calcular género/limpiar marca:
    // si tiene "||" (traducirDebajo), usa solo lo que está antes del separador.
    function partePrincipal(texto) {
        const t = String(texto);
        return t.includes("||") ? t.split("||")[0] : t;
    }

    function tarjetaConColorDeGenero(tarjeta, idioma) {
        const coloresPorFila = tarjeta.rows.map(fila => colorGeneroPorArticulo(partePrincipal(fila[0]), idioma));
        return {
            ...tarjeta,
            colorPorCelda: (fila, i, indiceFila) => (i === 0 ? coloresPorFila[indiceFila] : null),
            rows: tarjeta.rows.map(fila => fila.map(celda => {
                if (String(celda).includes("||")) {
                    const [principal, resto] = String(celda).split("||");
                    return limpiarMarcaGenero(principal) + "||" + resto;
                }
                return limpiarMarcaGenero(celda);
            }))
        };
    }

        { titulo: "[PERSONAS] ¿Cuándo se usan los tónicos?", headers: ["", "Francés"], columnasConSonido: [], ancha: true, rows: [
            ["", "Después de una preposición: avec moi, sans toi, pour lui, chez elle, entre nous, contre eux."],
            ["", "Para dar énfasis al inicio de la frase (moi, je pense que...), en respuestas cortas sin verbo (Qui veut du café? — Moi!), y en construcciones \"c'est + tónico\" (c'est moi qui...)."]
        ]},
        { titulo: "[PERSONAS] Reflexivo: siempre antes del verbo", headers: ["", "Francés"], columnasConSonido: [], ancha: true, rows: [
            ["", "El reflexivo va siempre antes del verbo conjugado: je me lave, tu te lèves. \"Me/te/se\" se elide a m'/t'/s' ante vocal o h muda: je m'appelle (yo me llamo)."],
            ["", "En tiempos compuestos, los verbos reflexivos forman el pasado SIEMPRE con être (nunca avoir): je me suis levé(e) (me levanté). En negación, \"ne\" y \"pas\" rodean al pronombre y al verbo juntos: je ne me lave pas."]
        ]},
        { titulo: "[HORA Y TIEMPO] Regla básica: \"il est\"", headers: ["", "Francés"], columnasConSonido: [], ancha: true, rows: [
            ["", "Para preguntar la hora: \"Quelle heure est-il?\". Para responder, siempre \"il est\" + número + heure(s) — sin artículo antes del número, a diferencia de italiano y portugués."],
            ["", "\"Heure\" va en singular solo con la 1: \"il est une heure\". Con el resto, siempre en plural: \"il est trois heures\"."]
        ]},
        { titulo: "[HORA Y TIEMPO] Sistema formal (reloj de 24 horas)", headers: ["", "Francés"], columnasConSonido: [], ancha: true, rows: [
            ["", "En horarios oficiales (trenes, check-in, recepción) se usan siempre los números directos del 0 al 23, nunca \"et quart\" ni \"moins le quart\": \"il est dix-sept heures trente\" (no \"cinq heures et demie\")."]
        ]},
        { titulo: "[HORA Y TIEMPO] \"Tout à l'heure\": pasado o futuro según el contexto", headers: ["", "Francés"], columnasConSonido: [], ancha: true, rows: [
            ["", "\"Tout à l'heure\" sirve para pasado reciente y futuro próximo dentro del mismo día: \"Je l'ai vu tout à l'heure\" (lo vi hace un rato) vs. \"Je t'appelle tout à l'heure\" (te llamo en un rato) — el tiempo verbal de la frase es lo que marca la diferencia, no la expresión en sí."]
        ]}
    ];

    const reglasItaliano = [
        { titulo: "[PRONOMBRES] CI — equivalente de \"y\"", headers: ["", "Italiano"], columnasConSonido: [], ancha: true, rows: [
            ["", "\"Ci\" funciona igual que el francés \"y\": reemplaza un lugar o un complemento con \"a\" cuando es cosa, nunca persona. Vado in albergo → Ci vado. Penso al lavoro → Ci penso."],
            ["", "Para personas se usa el pronombre tónico: Penso a mia moglie → Penso a lei (no \"ci penso\")."]
        ]},
        { titulo: "[PRONOMBRES] NE — equivalente de \"en\"", headers: ["", "Italiano"], columnasConSonido: [], ancha: true, rows: [
            ["", "\"Ne\" funciona igual que el francés \"en\": reemplaza origen, complemento con \"di\", o cantidad. Vengo dall'albergo → Ne vengo. Parlo di questo problema → Ne parlo. Vuoi del caffè? → Sì, ne voglio."],
            ["", "Tampoco reemplaza personas — se usa \"di\" + pronombre tónico: Parlo di Maria → Parlo di lei (no \"ne parlo\")."]
        ]},
        { titulo: "[PRONOMBRES] Relativos: \"che\" y \"cui\"", headers: ["", "Italiano"], columnasConSonido: [], ancha: true, rows: [
            ["", "\"Che\" sustituye sujeto o complemento objeto directo, sin preposición: la cliente che arriva (la clienta que llega)."],
            ["", "\"Cui\" sustituye cualquier complemento con preposición simple (di, a, da, in, con, su, per, tra): la camera in cui dormo (la habitación en la que duermo)."]
        ]},
        { titulo: "[PREPOSICIONES DE TIEMPO] Da — acción que empezó y sigue", headers: ["", "Italiano"], columnasConSonido: [], ancha: true, rows: [
            ["", "\"Da\" indica que algo empezó en el pasado y continúa ahora (equivalente al francés \"depuis\"): vivo qui dal 2020 (vivo aquí desde 2020, y sigo viviendo)."]
        ]},
        { titulo: "[PREPOSICIONES DE TIEMPO] Per — duración con principio y fin", headers: ["", "Italiano"], columnasConSonido: [], ancha: true, rows: [
            ["", "\"Per\" indica una duración definida, ya terminada, usada con el passato prossimo: ho lavorato qui per tre anni (trabajé aquí durante 3 años — ya no trabajo más ahí)."]
        ]},
        { titulo: "[PREPOSICIONES DE TIEMPO] Tra-Fra / Fa — futuro y pasado", headers: ["", "Italiano"], columnasConSonido: [], ancha: true, rows: [
            ["", "\"Tra\" o \"fra\" + duración = futuro (dentro de, equivalente al francés \"dans\"): il treno parte tra dieci minuti (el tren sale dentro de 10 minutos)."],
            ["", "\"Fa\" + duración = pasado (hace, equivalente al francés \"il y a\"): sono arrivato un'ora fa (llegué hace una hora)."]
        ]},
        { titulo: "[ADVERBIOS] Cantidad: variable (adjetivo) vs invariable (adverbio)", headers: ["", "Italiano"], columnasConSonido: [], ancha: true, rows: [
            ["", "A diferencia del francés y el portugués, en italiano \"molto\", \"poco\", \"troppo\", \"tanto\" CAMBIAN de género/número cuando acompañan a un sustantivo (son adjetivos): ho molta fame, ho molti amici."],
            ["", "Cuando modifican un verbo, adjetivo u otro adverbio, son adverbios y quedan siempre invariables: sono molto stanco/stanca, mi sono divertito molto."]
        ]},
        { titulo: "[ADVERBIOS] Modo: formación en -mente", headers: ["", "Italiano"], columnasConSonido: [], ancha: true, rows: [
            ["", "Se toma el adjetivo en femenino singular y se agrega \"-mente\": lenta → lentamente, attenta → attentamente."],
            ["", "Si el adjetivo termina en -e, se agrega directamente: felice → felicemente. Si termina en -le o -re (precedido de vocal), se pierde la -e final: facile → facilmente, singolare → singolarmente."]
        ]},
        { titulo: "[CONECTORES LÓGICOS] \"Perché\" no puede ir al inicio (salvo respuesta)", headers: ["", "Italiano"], columnasConSonido: [], ancha: true, rows: [
            ["", "Igual que \"car\" en francés, \"perché\" causal no inicia una oración nueva — conecta una ya empezada: \"Resto a casa perché piove\" (me quedo en casa porque llueve)."],
            ["", "La única excepción es cuando responde directamente a una pregunta con \"Perché...?\": \"Perché non vieni?\" — \"Perché sono stanco\" (¿Por qué no venís? — Porque estoy cansado)."]
        ]},
        { titulo: "[CONECTORES LÓGICOS] Sin equivalente exacto de \"or\"", headers: ["", "Italiano"], columnasConSonido: [], ancha: true, rows: [
            ["", "El italiano no tiene una conjunción de coordinación equivalente a \"or\". El contraste lógico (\"sin embargo, resulta que...\") se cubre con adverbios como \"tuttavia\" o \"eppure\": \"aveva detto che sarebbe venuto, eppure non è venuto\"."]
        ]},
        { titulo: "[CONECTORES LÓGICOS] Afirmación: orden básico", headers: ["", "Italiano"], columnasConSonido: [], ancha: true, rows: [
            ["", "Sujeto + Verbo + Objeto, igual que en español: \"Il cliente prenota una camera\" (el cliente reserva una habitación)."]
        ]},
        { titulo: "[CONECTORES LÓGICOS] Negación: 1 o 2 palabras, según el orden", headers: ["", "Italiano"], columnasConSonido: [], ancha: true, rows: [
            ["", "Si el elemento negativo (nessuno, niente, mai) va DESPUÉS del verbo, se necesita \"non\" antes: non è venuto nessuno, non ho visto niente."],
            ["", "Si el elemento negativo va ANTES del verbo (como sujeto), \"non\" se omite: nessuno è venuto, niente mi spaventa."]
        ]},
        { titulo: "[CONECTORES LÓGICOS] Interrogación: entonación o palabra interrogativa", headers: ["", "Italiano"], columnasConSonido: [], ancha: true, rows: [
            ["", "A diferencia del francés, el italiano no tiene un sistema de inversión obligatorio — alcanza con la entonación ascendente (y el signo de pregunta al escribir): \"Ha una prenotazione?\" (mismo orden que la afirmación, solo cambia el tono)."],
            ["", "Para preguntas parciales se usa una palabra interrogativa al inicio: Chi, Cosa, Dove, Quando, Come, Perché — \"Dove è la sua camera?\" (¿dónde está su habitación?)."]
        ]},
        { titulo: "[FRASES DE RECEPCIÓN] Aplicado: gramática que ya conocés", headers: ["", "Italiano"], columnasConSonido: [], ancha: true, rows: [
            ["", "Estas frases usan reglas que ya viste en otras unidades: \"Lei\" como cortesía formal, con mayúscula y verbo en 3ª persona femenina, incluso dirigiéndose a un hombre (PRONOMBRES SUJETO) — \"Lei ha una prenotazione?\", \"Potrebbe attendere un attimo?\"."]
        ]},
        { titulo: "[ARTÍCULOS] A diferencia del francés", headers: ["", "Italiano"], columnasConSonido: [], ancha: true, rows: [
            ["", "El indefinido no tiene plural propio — el partitivo plural (dei, degli, delle) cumple ese rol, con el sentido de \"algunos/algunas\"."]
        ]},
        { titulo: "[POSESIVOS] El artículo es obligatorio", headers: ["", "Italiano"], columnasConSonido: [], ancha: true, rows: [
            ["", "A diferencia del francés, en italiano el posesivo casi siempre va precedido del artículo definido: \"il mio passaporto\", nunca solo \"mio passaporto\" (salvo la excepción de parentesco, ver al lado)."],
            ["", "Loro (de ellos/ellas) es invariable — no cambia con género ni número, pero el artículo que lo acompaña sí concuerda con lo poseído: \"il loro libro\", \"la loro casa\"."]
        ]},
        { titulo: "[POSESIVOS] Excepción clave: parentesco en singular", headers: ["", "Italiano"], columnasConSonido: [], ancha: true, rows: [
            ["", "Con un término de parentesco en singular sin modificador, se omite el artículo: \"mio fratello\", \"tua madre\", \"nostro zio\" (pero \"loro\" siempre lleva artículo: \"il loro fratello\")."],
            ["", "Si el parentesco va en plural, o lleva un adjetivo o diminutivo, el artículo vuelve: \"i miei fratelli\", \"la mia sorella minore\", \"il mio fratellino\"."]
        ]},
        { titulo: "[PERSONAS] Casi siempre se omite", headers: ["", "Italiano"], columnasConSonido: [], ancha: true, rows: [
            ["", "La terminación del verbo ya indica la persona, así que el pronombre suele omitirse: \"vado\" ya significa \"yo voy\", sin necesitar \"io vado\"."],
            ["", "Se usa el pronombre solo para dar énfasis, marcar contraste, o cuando la forma verbal es ambigua entre personas (ej. en el subjuntivo presente, donde io/tu/lui-lei se conjugan igual)."]
        ]},
        { titulo: "[PERSONAS] Cortesía: \"Lei\"", headers: ["", "Italiano"], columnasConSonido: [], ancha: true, rows: [
            ["", "\"Lei\" (con mayúscula) es la forma de cortesía formal para dirigirse a alguien, hombre o mujer, conjugando el verbo en 3ª persona singular femenino — clave en recepción de hotel: \"Lei desidera...?\" con cualquier huésped."]
        ]},
        { titulo: "[PERSONAS] ¿Cuándo se usan los tónicos?", headers: ["", "Italiano"], columnasConSonido: [], ancha: true, rows: [
            ["", "Solo \"me\" y \"te\" son distintos del pronombre sujeto (io/tu) — el resto (lui, lei, noi, voi, loro) son las mismas palabras que ya usás como sujeto."],
            ["", "Se usan después de una preposición (con me, per te, da lei, tra noi), después de secondo/come/quanto, o para dar énfasis (anche te, proprio lui)."]
        ]},
        { titulo: "[PERSONAS] Reflexivos: iguales a los pronombres COD", headers: ["", "Italiano"], columnasConSonido: [], ancha: true, rows: [
            ["", "Los reflexivos italianos (mi, ti, si, ci, vi, si) son exactamente los mismos pronombres que ya viste como COD — a diferencia del francés, que tiene palabras propias para el reflexivo (me/te/se)."],
            ["", "Van antes del verbo en general (mi chiamo), pero después y pegados con guion en infinitivo, gerundio e imperativo afirmativo (chiamarsi → voglio chiamarmi; alzati! = ¡levantate!). Los verbos reflexivos forman el pasado siempre con essere."]
        ]},
        { titulo: "[HORA Y TIEMPO] Regla básica: artículo \"le\" obligatorio", headers: ["", "Italiano"], columnasConSonido: [], ancha: true, rows: [
            ["", "Para preguntar la hora: \"Che ora è?\" o \"Che ore sono?\" (ambas correctas y equivalentes). Para responder, \"sono le\" + número — el artículo femenino plural \"le\" es obligatorio antes del número."],
            ["", "La 1, el mediodía y la medianoche son la excepción: van en singular, sin \"le\": \"è l'una\", \"è mezzogiorno\", \"è mezzanotte\"."]
        ]},
        { titulo: "[HORA Y TIEMPO] Sistema formal (reloj de 24 horas)", headers: ["", "Italiano"], columnasConSonido: [], ancha: true, rows: [
            ["", "En horarios oficiales se usan los números directos del 0 al 23, igual que en francés: \"sono le diciassette e trenta\" (no \"le cinque e mezza\")."]
        ]},
        { titulo: "[HORA Y TIEMPO] A diferencia del francés", headers: ["", "Italiano"], columnasConSonido: [], ancha: true, rows: [
            ["", "El italiano separa con claridad pasado y futuro próximo: \"poco fa\" siempre es pasado (hace poco), \"tra poco\" siempre es futuro (en un rato) — no hay ambigüedad como con el francés \"tout à l'heure\"."]
        ]}
    ];

    const reglasPortugues = [
        { titulo: "[PRONOMBRES] No existe un equivalente de \"y\"/\"en\"", headers: ["", "Português"], columnasConSonido: [], ancha: true, rows: [

        { titulo: "[PRONOMBRES] Relativos: \"que\", \"quem\", \"cujo\"", headers: ["", "Português"], columnasConSonido: [], ancha: true, rows: [

        { titulo: "[PREPOSICIONES DE TIEMPO] Desde — desde un punto exacto", headers: ["", "Português"], columnasConSonido: [], ancha: true, rows: [

        { titulo: "[PREPOSICIONES DE TIEMPO] Durante / Dentro de", headers: ["", "Português"], columnasConSonido: [], ancha: true, rows: [

        { titulo: "[ADVERBIOS] Invariables como adverbio", headers: ["", "Português"], columnasConSonido: [], ancha: true, rows: [
            ["", "A diferencia del italiano, en portugués estas palabras son siempre invariables cuando funcionan como adverbio (modifican verbo/adjetivo): ela trabalha muito, está bastante cansada — sin cambiar de forma."],

        { titulo: "[ADVERBIOS] Modo: formación en -mente", headers: ["", "Português"], columnasConSonido: [], ancha: true, rows: [
            ["", "Se toma el adjetivo en femenino y se agrega \"-mente\": lenta → lentamente, rápida → rapidamente."],
            ["", "Para adjetivos uniformes (terminados en -e, -l, -z, -s) se agrega directamente, sin cambio: feliz → felizmente, simples → simplesmente."]
        ]},
        { titulo: "[CONECTORES LÓGICOS] \"Pois\": dos significados según posición", headers: ["", "Português"], columnasConSonido: [], ancha: true, rows: [
            ["", "Antes del verbo, al inicio de la oración subordinada, \"pois\" funciona como \"porque\" (causa): \"Não saí, pois chovia\" (no salí, porque llovía)."],
            ["", "Después del verbo, en medio o al final de la oración, \"pois\" cambia de sentido y funciona como \"por lo tanto/entonces\" (consecuencia): \"Estudei muito, fui bem na prova, pois\" (estudié mucho, por lo tanto me fue bien en la prueba)."]
        ]},
        { titulo: "[CONECTORES LÓGICOS] Sin equivalente exacto de \"or\"", headers: ["", "Português"], columnasConSonido: [], ancha: true, rows: [
            ["", "Igual que en italiano, el portugués no tiene una conjunción de coordinación equivalente a \"or\" francés. El contraste lógico se cubre con \"no entanto\" o \"contudo\": \"tinha dito que viria, no entanto não veio\"."]
        ]},
        { titulo: "[CONECTORES LÓGICOS] Afirmación: orden básico", headers: ["", "Português"], columnasConSonido: [], ancha: true, rows: [
            ["", "Sujeto + Verbo + Objeto, igual que en español: \"O cliente reserva um quarto\" (el cliente reserva una habitación)."]
        ]},
        { titulo: "[CONECTORES LÓGICOS] Negación: 1 o 2 palabras, según el orden", headers: ["", "Português"], columnasConSonido: [], ancha: true, rows: [
            ["", "Misma regla que el italiano: si el elemento negativo (ninguém, nada, nunca) va DESPUÉS del verbo, se necesita \"não\" antes: não veio ninguém, não vi nada."],
            ["", "Si el elemento negativo va ANTES del verbo (como sujeto), \"não\" se omite: ninguém veio, nada me assusta."]

        { titulo: "[CONECTORES LÓGICOS] Interrogación: entonación o palabra interrogativa", headers: ["", "Português"], columnasConSonido: [], ancha: true, rows: [
            ["", "Igual que en italiano, alcanza con la entonación ascendente: \"Tem uma reserva?\" (mismo orden que la afirmación, solo cambia el tono)."],
            ["", "Para preguntas parciales se usa una palabra interrogativa al inicio: Quem, O que, Onde, Quando, Como, Porque — \"Onde está o seu quarto?\" (¿dónde está su habitación?)."]
        ]},
        { titulo: "[FRASES DE RECEPCIÓN] Aplicado: gramática que ya conocés", headers: ["", "Português"], columnasConSonido: [], ancha: true, rows: [
            ["", "Estas frases usan reglas que ya viste en otras unidades: \"você\" como forma práctica de cortesía (PRONOMBRES SUJETO), y el pronombre sujeto se omite con frecuencia (\"tem uma reserva?\" en vez de \"você tem uma reserva?\")."]
        ]},
        { titulo: "[ARTÍCULOS] ¿Y el partitivo?", headers: ["", "Português"], columnasConSonido: [], ancha: true, rows: [
            ["", "A diferencia del francés y el italiano, en portugués el artículo partitivo prácticamente no se usa hoy — existió en otra época, pero quedó en desuso."],
            ["", "Donde el francés diría \"du café\" o el italiano \"del caffè\", el portugués simplemente dice \"café\" sin artículo, o usa um/uma si hace falta precisar una unidad."]
        ]},
        { titulo: "[POSESIVOS] El artículo es opcional (pero frecuente)", headers: ["", "Português"], columnasConSonido: [], ancha: true, rows: [
            ["", "En portugués europeo es muy común decir \"o meu carro\" con artículo, a diferencia del portugués de Brasil, donde suele omitirse (\"meu carro\")."],
            ["", "Con artículo definido, el posesivo va antes del sustantivo (\"o meu amigo\"). Con artículo indefinido, el posesivo suele ir después (\"um amigo meu\")."]
        ]},
        { titulo: "[POSESIVOS] Ambigüedad de \"seu/sua\"", headers: ["", "Português"], columnasConSonido: [], ancha: true, rows: [
            ["", "\"Seu/sua\" puede significar \"de él\", \"de ella\", \"de usted\" o \"de ustedes\" — para evitar confusión, se puede aclarar con \"dele\", \"dela\", \"deles\", \"delas\": \"o livro dele\" en vez de \"o seu livro\"."]
        ]},
        { titulo: "[PERSONAS] También se omite con frecuencia", headers: ["", "Português"], columnasConSonido: [], ancha: true, rows: [
            ["", "Igual que en italiano, la terminación verbal suele alcanzar para saber la persona, así que el pronombre se omite seguido, sobre todo en el habla oral: \"estou a estudar\" en vez de \"eu estou a estudar\"."]
        ]},
        { titulo: "[PERSONAS] Cortesía: \"você\", no \"tu\"", headers: ["", "Português"], columnasConSonido: [], ancha: true, rows: [
            ["", "Para recepción de hotel, lo práctico es usar \"você\" con los huéspedes (cortesía, conjugado en 3ª persona) — \"tu\" es informal/regional y no conviene con desconocidos."],
            ["", "\"Vós\" (2ª persona plural) casi no se usa hoy en portugués europeo — se reemplaza por \"vocês\"."]
        ]},
        { titulo: "[PERSONAS] ¿Cuándo se usan los tónicos?", headers: ["", "Português"], columnasConSonido: [], ancha: true, rows: [
            ["", "Siempre van después de una preposición: para mim, sem ti, por nós, entre mim e ti."],
            ["", "Con la preposición \"com\" se fusionan en una sola palabra: comigo, contigo, conosco (en vez de \"com mim\", \"com ti\", \"com nós\")."]
        ]},
        { titulo: "[PERSONAS] Reflexivo: después del verbo, con guion (lo normal en PT-PT)", headers: ["", "Português"], columnasConSonido: [], ancha: true, rows: [
            ["", "A diferencia del francés y el italiano (siempre antes del verbo), en portugués europeo la posición habitual en una frase afirmativa simple es DESPUÉS del verbo, unido con guion: \"chamo-me\" (no \"me chamo\", que sí es normal en portugués de Brasil)."],
            ["", "El reflexivo pasa a ir ANTES del verbo con la negación, en preguntas, y después de ciertas palabras (alguém, nunca, que, quando...): \"não me chamo assim\", \"como te chamas?\"."]
        ]},
        { titulo: "[HORA Y TIEMPO] Regla básica: \"é\" / \"são\"", headers: ["", "Português"], columnasConSonido: [], ancha: true, rows: [
            ["", "Para preguntar la hora: \"Que horas são?\". Para responder: \"é\" solo con la 1/mediodía/medianoche; \"são\" con el resto: \"é uma hora\", \"são três horas\"."],
            ["", "El verbo concuerda con el número, no con la palabra \"horas\" — por eso \"é uma hora\" (singular) pero \"são duas horas\" (plural)."]
        ]},
        { titulo: "[HORA Y TIEMPO] PT-PT cuenta hacia la hora siguiente", headers: ["", "Português"], columnasConSonido: [], ancha: true, rows: [

    function renderReglas(idioma) {
        document.getElementById('mesaDeTarjetas').style.display = "none";

    const particulasEstado = {};

    function renderParticulas(idioma) {
        document.getElementById('mesaDeTarjetas').style.display = "block";
        document.getElementById('contentTable').style.display = "none";
        posicionarMesaDeTarjetas();
        const tarjetas = PARTICULAS_POR_IDIOMA[idioma];

        let html = `<div style="position:relative; width:100%; height:100%;">`;
        tarjetas.forEach((t, i) => {
            const id = idioma + "__t" + i;
            if (!particulasEstado[id]) {
                particulasEstado[id] = { left: 0, top: 0, alto: null, tamanoManual: false, visible: false };
            }
            const e = particulasEstado[id];
            if (!e.visible) return;
            const estiloAlto = e.tamanoManual ? `height:${e.alto}px;` : `height:auto;`;
            const claseAuto = e.tamanoManual ? "" : " tarjeta-libre-auto";
            const final = t.colorPorCelda ? t : tarjetaConColorDeGenero(t, idioma);
            html += `<div class="tarjeta-libre${claseAuto}" data-clave="${id}" style="left:${e.left}px; top:${e.top}px; width:auto; ${estiloAlto}">
                <div class="tarjeta-libre-contenido">
                    <div class="tarjeta tarjeta-con-borde">${renderTabla(final, idioma)}</div>
                </div>
                <div class="tarjeta-libre-manija-resize" title="Cambiar altura"><svg viewBox="0 0 24 24" width="14" height="14"><path d="M12 4l-4 4h8l-4-4zm0 16l4-4H8l4 4z" fill="currentColor"/></svg></div>
            </div>`;
        });
        html += '</div>';

        document.getElementById('mesaDeTarjetas').innerHTML = html;
        document.getElementById('mesaDeTarjetas').classList.toggle("editor-activo", editorLibreActivo);
        requestAnimationFrame(() => inicializarArrastreParticulas());
        return null;
    }

    function inicializarArrastreParticulas() {
        const tarjetasEl = document.querySelectorAll('#mesaDeTarjetas .tarjeta-libre');
        tarjetasEl.forEach(el => {
            const id = el.dataset.clave;
            const e = particulasEstado[id];
            if (!e) return;
            const zonaMover = el.querySelector('caption');
            const manijaResize = el.querySelector('.tarjeta-libre-manija-resize');

            if (zonaMover) {
                zonaMover.addEventListener('pointerdown', (ev) => {
                    if (!editorLibreActivo) return;
                    ev.preventDefault();
                    el.style.zIndex = 50;
                    const inicioX = ev.clientX, inicioY = ev.clientY;
                    const left0 = el.offsetLeft, top0 = el.offsetTop;
                    const rectMesa = document.getElementById('mesaDeTarjetas').getBoundingClientRect();
                    const rectTarjeta = el.getBoundingClientRect();
                    const limiteX = rectMesa.width - rectTarjeta.width;
                    const limiteY = rectMesa.height - rectTarjeta.height;

                    function mover(ev2) {
                        const dx = ev2.clientX - inicioX, dy = ev2.clientY - inicioY;
                        el.style.left = Math.min(Math.max(0, left0 + dx), Math.max(0, limiteX)) + "px";
                        el.style.top = Math.min(Math.max(0, top0 + dy), Math.max(0, limiteY)) + "px";
                    }
                    function soltar() {
                        document.removeEventListener('pointermove', mover);
                        document.removeEventListener('pointerup', soltar);
                        e.left = el.offsetLeft;
                        e.top = el.offsetTop;
                    }
                    document.addEventListener('pointermove', mover);
                    document.addEventListener('pointerup', soltar);
                });
            }

            if (manijaResize) {
                manijaResize.addEventListener('pointerdown', (ev) => {
                    if (!editorLibreActivo) return;
                    ev.preventDefault();
                    el.style.zIndex = 50;
                    const tabla = el.querySelector('table');
                    const filaEjemplo = tabla ? tabla.querySelector('tr') : null;
                    const altoMinimo = 40 + (filaEjemplo ? filaEjemplo.getBoundingClientRect().height : 30);
                    const inicioY = ev.clientY;
                    const h0 = el.offsetHeight;
                    const rectMesa = document.getElementById('mesaDeTarjetas').getBoundingClientRect();

                    function mover(ev2) {
                        const dy = ev2.clientY - inicioY;
                        const maxAlto = rectMesa.height - el.offsetTop;
                        const nuevoAlto = Math.min(maxAlto, Math.max(altoMinimo, h0 + dy));
                        el.style.height = nuevoAlto + "px";
                    }
                    function soltar() {
                        document.removeEventListener('pointermove', mover);
                        document.removeEventListener('pointerup', soltar);
                        e.alto = el.offsetHeight;
                        e.tamanoManual = true;
                        el.classList.remove("tarjeta-libre-auto");
                    }
                    document.addEventListener('pointermove', mover);
                    document.addEventListener('pointerup', soltar);
                });
            }
        });
    }

    function inicializarArrastreCultura() {
        const tarjetasEl = document.querySelectorAll('#mesaDeTarjetas .tarjeta-libre');
        tarjetasEl.forEach(el => {
            const id = el.dataset.clave;
            const e = culturaEstado[id];
            if (!e) return;
            const zonaMover = el.querySelector('caption');
            const manijaResize = el.querySelector('.tarjeta-libre-manija-resize');

            if (zonaMover) {
                zonaMover.addEventListener('pointerdown', (ev) => {
                    if (!editorLibreActivo) return;
                    ev.preventDefault();
                    el.style.zIndex = 50;
                    const inicioX = ev.clientX, inicioY = ev.clientY;
                    const left0 = el.offsetLeft, top0 = el.offsetTop;
                    const rectMesa = document.getElementById('mesaDeTarjetas').getBoundingClientRect();
                    const rectTarjeta = el.getBoundingClientRect();
                    const limiteX = rectMesa.width - rectTarjeta.width;
                    const limiteY = rectMesa.height - rectTarjeta.height;

                    function mover(ev2) {
                        const dx = ev2.clientX - inicioX, dy = ev2.clientY - inicioY;
                        el.style.left = Math.min(Math.max(0, left0 + dx), Math.max(0, limiteX)) + "px";
                        el.style.top = Math.min(Math.max(0, top0 + dy), Math.max(0, limiteY)) + "px";

                    function soltar() {
                        document.removeEventListener('pointermove', mover);

                        el.classList.remove("tarjeta-libre-auto");

                    document.addEventListener('pointermove', mover);
                    document.addEventListener('pointerup', soltar);
                });
            }
        });
    }

    function renderGeografiaClimaNuevo(idioma) {
        document.getElementById('mesaDeTarjetas').style.display = "block";
        document.getElementById('contentTable').style.display = "none";
        posicionarMesaDeTarjetas();
        const tarjetas = GEOGRAFIA_CLIMA_NUEVO_POR_IDIOMA[idioma][modoGeografiaClimaNuevo];

        let html = `<div style="position:relative; width:100%; height:100%;">`;
        tarjetas.forEach((t, i) => {
            const id = idioma + "__" + modoGeografiaClimaNuevo + "__t" + i;
            if (!geografiaClimaNuevoEstado[id]) {
                geografiaClimaNuevoEstado[id] = { left: 0, top: 0, alto: null, tamanoManual: false, visible: false };
            }
            const e = geografiaClimaNuevoEstado[id];
            if (!e.visible) return;
            const estiloAlto = e.tamanoManual ? `height:${e.alto}px;` : `height:auto;`;
            const claseAuto = e.tamanoManual ? "" : " tarjeta-libre-auto";
            html += `<div class="tarjeta-libre${claseAuto}" data-clave="${id}" style="left:${e.left}px; top:${e.top}px; width:auto; ${estiloAlto}">
                <div class="tarjeta-libre-contenido">
                    <div class="tarjeta tarjeta-con-borde">${renderTabla(t, idioma)}</div>
                </div>
                <div class="tarjeta-libre-manija-resize" title="Cambiar altura"><svg viewBox="0 0 24 24" width="14" height="14"><path d="M12 4l-4 4h8l-4-4zm0 16l4-4H8l4 4z" fill="currentColor"/></svg></div>
            </div>`;
        });
        html += '</div>';

        document.getElementById('mesaDeTarjetas').innerHTML = html;
        document.getElementById('mesaDeTarjetas').classList.toggle("editor-activo", editorLibreActivo);
        requestAnimationFrame(() => inicializarArrastreGeografiaClimaNuevo());
        return null;
    }

    function inicializarArrastreGeografiaClimaNuevo() {
        const tarjetasEl = document.querySelectorAll('#mesaDeTarjetas .tarjeta-libre');
        tarjetasEl.forEach(el => {
            const id = el.dataset.clave;
            const e = geografiaClimaNuevoEstado[id];
            if (!e) return;
            const zonaMover = el.querySelector('caption');
            const manijaResize = el.querySelector('.tarjeta-libre-manija-resize');

            if (zonaMover) {
                zonaMover.addEventListener('pointerdown', (ev) => {
                    if (!editorLibreActivo) return;
                    ev.preventDefault();
                    el.style.zIndex = 50;
                    const inicioX = ev.clientX, inicioY = ev.clientY;
                    const left0 = el.offsetLeft, top0 = el.offsetTop;
                    const rectMesa = document.getElementById('mesaDeTarjetas').getBoundingClientRect();
                    const rectTarjeta = el.getBoundingClientRect();
                    const limiteX = rectMesa.width - rectTarjeta.width;
                    const limiteY = rectMesa.height - rectTarjeta.height;

                    function mover(ev2) {
                        const dx = ev2.clientX - inicioX, dy = ev2.clientY - inicioY;
                        el.style.left = Math.min(Math.max(0, left0 + dx), Math.max(0, limiteX)) + "px";
                        el.style.top = Math.min(Math.max(0, top0 + dy), Math.max(0, limiteY)) + "px";
                    }
                    function soltar() {
                        document.removeEventListener('pointermove', mover);
                        document.removeEventListener('pointerup', soltar);
                        e.left = el.offsetLeft;
                        e.top = el.offsetTop;
                    }
                    document.addEventListener('pointermove', mover);
                    document.addEventListener('pointerup', soltar);
                });
            }

            if (manijaResize) {
                manijaResize.addEventListener('pointerdown', (ev) => {
                    if (!editorLibreActivo) return;
                    ev.preventDefault();
                    el.style.zIndex = 50;
                    const tabla = el.querySelector('table');
                    const filaEjemplo = tabla ? tabla.querySelector('tr') : null;
                    const altoMinimo = 40 + (filaEjemplo ? filaEjemplo.getBoundingClientRect().height : 30);
                    const inicioY = ev.clientY;
                    const h0 = el.offsetHeight;
                    const rectMesa = document.getElementById('mesaDeTarjetas').getBoundingClientRect();

                    function mover(ev2) {
                        const dy = ev2.clientY - inicioY;
                        const maxAlto = rectMesa.height - el.offsetTop;
                        const nuevoAlto = Math.min(maxAlto, Math.max(altoMinimo, h0 + dy));
                        el.style.height = nuevoAlto + "px";
                    }
                    function soltar() {
                        document.removeEventListener('pointermove', mover);
                        document.removeEventListener('pointerup', soltar);
                        e.alto = el.offsetHeight;
                        e.tamanoManual = true;
                        el.classList.remove("tarjeta-libre-auto");
                    }
                    document.addEventListener('pointermove', mover);
                    document.addEventListener('pointerup', soltar);
                });
            }
        });
    }


    function obtenerMesaDeTarjetas() {
        const barra = document.querySelector('.header-izquierda');
        const altoBarra = barra ? barra.getBoundingClientRect().bottom : 84;
        const altoDisponible = window.innerHeight - altoBarra;
        const anchoDisponible = window.innerWidth;
        return {
            ancho: anchoDisponible - MARGEN_MESA * 2,
            alto: altoDisponible - MARGEN_MESA * 2,
            top: altoBarra + MARGEN_MESA,
            left: MARGEN_MESA
        };
    }

    // Aplica las medidas reales al elemento DOM de la mesa — se llama cada vez
    // que se muestra o se necesita re-posicionar (ej. cambio de unidad).
    function posicionarMesaDeTarjetas() {
        const mesa = document.getElementById('mesaDeTarjetas');
        if (!mesa) return null;
        const m = obtenerMesaDeTarjetas();
        mesa.style.top = m.top + "px";
        mesa.style.left = m.left + "px";
        mesa.style.width = m.ancho + "px";
        mesa.style.height = m.alto + "px";
        return m;
    }

    // Calcula el color real de género de una palabra de vocabulario, y si hace
    // falta, la aclaración chica "f"/"m" para los casos de l' (donde el
    // artículo en sí no deja ver el género, pero la palabra SÍ tiene uno real
    // — por eso no es "indistinto", es violeta + aclaración del género real).
    function colorYAclaracionVocabulario(palabraConMarca, idioma) {
        const tieneMarcaFem = /#fem$/.test(palabraConMarca);
        const tieneMarcaMasc = /#masc$/.test(palabraConMarca);
        const palabraLimpia = palabraConMarca.replace(/#(masc|fem)$/, "");
        const matchLApostrofe = palabraLimpia.match(/^(l['’])(.+)$/i);

        if (matchLApostrofe && (tieneMarcaFem || tieneMarcaMasc)) {
            // El "l'" en sí queda violeta (no muestra género a simple vista),
            // pero el RESTO de la palabra se pinta directo con su color real
            // de género — todo dentro de la misma celda/palabra clickeable.
            const [, articulo, resto] = matchLApostrofe;
            const colorResto = tieneMarcaFem ? "genero-fem" : "genero-masc";
            return {
                texto: palabraLimpia,
                html: `<span class="genero-indistinto">${articulo}</span><span class="${colorResto}">${resto}</span>`
            };
        }
        // Resto de casos: el artículo real (le/la/les) ya muestra el género,
        // se usa el sistema de color normal sobre la palabra entera.
        const colorClase = colorGeneroPorArticulo(palabraLimpia, idioma);
        return {
            texto: palabraLimpia,
            html: colorClase ? `<span class="${colorClase}">${palabraLimpia}</span>` : palabraLimpia
        };
    }

    function inicializarArrastreVocabularioNuevo() {
        const idioma = document.getElementById('btnIdioma').dataset.idioma;
        const elColores = document.querySelector(`#mesaDeTarjetas .tarjeta-libre[data-clave="colores__${idioma}"]`);
        const elVocab = document.querySelector(`#mesaDeTarjetas .tarjeta-libre[data-clave="vocab__${idioma}"]`);
        const eV = vocabularioNuevoEstado[idioma].vocab;

        // Si vocabulario todavía no tiene posición fijada (primera vez que se
        // ve), se mide Colores YA pintado en el DOM y se calcula un lugar fijo
        // y prolijo al lado — ancho real de Colores + margen. El ALTO se deja
        // en su tamaño natural completo (no se copia el de Colores), igual que
        // cualquier otra tarjeta nueva del sistema — así no cambia de tamaño
        // entre el primer tema visto y los siguientes.
        const MARGEN_VOCAB = 24;
        if (elColores && elVocab && eV.left === null) {
            const rectColores = elColores.getBoundingClientRect();
            eV.left = rectColores.width + MARGEN_VOCAB;
            elVocab.style.left = eV.left + "px";
        }

        [elColores, elVocab].forEach(el => {
            if (!el) return;
            const clave = el.dataset.clave.split("__")[0]; // "colores" o "vocab", sin el idioma
            const e = vocabularioNuevoEstado[idioma][clave];
            const zonaMover = el.querySelector('caption');
            const manijaResize = el.querySelector('.tarjeta-libre-manija-resize');

            if (zonaMover) {
                zonaMover.addEventListener('pointerdown', (ev) => {
                    if (!editorLibreActivo) return; // el editor debe estar prendido para poder mover/redimensionar
                    ev.preventDefault();
                    el.style.zIndex = 50;
                    const inicioX = ev.clientX, inicioY = ev.clientY;
                    const left0 = el.offsetLeft, top0 = el.offsetTop;
                    const rectMesa = document.getElementById('mesaDeTarjetas').getBoundingClientRect();
                    const rectTarjeta = el.getBoundingClientRect();
                    const limiteX = rectMesa.width - rectTarjeta.width;
                    const limiteY = rectMesa.height - rectTarjeta.height;

                    function mover(ev2) {
                        const dx = ev2.clientX - inicioX, dy = ev2.clientY - inicioY;
                        el.style.left = Math.min(Math.max(0, left0 + dx), Math.max(0, limiteX)) + "px";
                        el.style.top = Math.min(Math.max(0, top0 + dy), Math.max(0, limiteY)) + "px";
                    }
                    function soltar() {
                        document.removeEventListener('pointermove', mover);
                        document.removeEventListener('pointerup', soltar);
                        e.left = el.offsetLeft;
                        e.top = el.offsetTop;
                    }
                    document.addEventListener('pointermove', mover);
                    document.addEventListener('pointerup', soltar);
                });
            }

            if (manijaResize) {
                manijaResize.addEventListener('pointerdown', (ev) => {
                    if (!editorLibreActivo) return; // el editor debe estar prendido para poder mover/redimensionar
                    ev.preventDefault();
                    el.style.zIndex = 50;
                    const tabla = el.querySelector('table');
                    const filaEjemplo = tabla ? tabla.querySelector('tr') : null;
                    const altoMinimo = 40 + (filaEjemplo ? filaEjemplo.getBoundingClientRect().height : 30);
                    const inicioY = ev.clientY;
                    const h0 = el.offsetHeight;
                    const rectMesa = document.getElementById('mesaDeTarjetas').getBoundingClientRect();

                    function mover(ev2) {
                        const dy = ev2.clientY - inicioY;
                        const maxAlto = rectMesa.height - el.offsetTop;
                        const nuevoAlto = Math.min(maxAlto, Math.max(altoMinimo, h0 + dy));
                        el.style.height = nuevoAlto + "px";
                    }
                    function soltar() {
                        document.removeEventListener('pointermove', mover);
                        document.removeEventListener('pointerup', soltar);
                        e.alto = el.offsetHeight;
                        e.tamanoManual = true;
                        el.classList.remove("tarjeta-libre-auto");
                    }
                    document.addEventListener('pointermove', mover);
                    document.addEventListener('pointerup', soltar);
                });
            }
        });
    }

    function inicializarArrastreNumerosTiempoNuevo() {
        const tarjetasEl = document.querySelectorAll('#mesaDeTarjetas .tarjeta-libre');
        tarjetasEl.forEach(el => {
            const id = el.dataset.clave;
            const e = numerosTiempoNuevoEstado[id];
            if (!e) return;
            const zonaMover = el.querySelector('caption, .relojes-titulo');
            const manijaResize = el.querySelector('.tarjeta-libre-manija-resize');

            if (zonaMover) {
                zonaMover.addEventListener('pointerdown', (ev) => {
                    if (!editorLibreActivo) return; // el editor debe estar prendido para poder mover/redimensionar
                    ev.preventDefault();
                    el.style.zIndex = 50;
                    const inicioX = ev.clientX, inicioY = ev.clientY;
                    const left0 = el.offsetLeft, top0 = el.offsetTop;
                    const rectMesa = document.getElementById('mesaDeTarjetas').getBoundingClientRect();
                    const rectTarjeta = el.getBoundingClientRect();
                    const limiteX = rectMesa.width - rectTarjeta.width;
                    const limiteY = rectMesa.height - rectTarjeta.height;

                    function mover(ev2) {
                        const dx = ev2.clientX - inicioX, dy = ev2.clientY - inicioY;
                        el.style.left = Math.min(Math.max(0, left0 + dx), Math.max(0, limiteX)) + "px";
                        el.style.top = Math.min(Math.max(0, top0 + dy), Math.max(0, limiteY)) + "px";
                    }
                    function soltar() {
                        document.removeEventListener('pointermove', mover);
                        document.removeEventListener('pointerup', soltar);
                        e.left = el.offsetLeft;
                        e.top = el.offsetTop;
                    }
                    document.addEventListener('pointermove', mover);
                    document.addEventListener('pointerup', soltar);
                });
            }

            if (manijaResize) {
                manijaResize.addEventListener('pointerdown', (ev) => {
                    if (!editorLibreActivo) return; // el editor debe estar prendido para poder mover/redimensionar
                    ev.preventDefault();
                    el.style.zIndex = 50;
                    const tabla = el.querySelector('table');
                    const filaEjemplo = tabla ? tabla.querySelector('tr') : null;
                    const altoMinimo = 40 + (filaEjemplo ? filaEjemplo.getBoundingClientRect().height : 30);
                    const inicioY = ev.clientY;
                    const h0 = el.offsetHeight;
                    const rectMesa = document.getElementById('mesaDeTarjetas').getBoundingClientRect();

                    function mover(ev2) {
                        const dy = ev2.clientY - inicioY;
                        const maxAlto = rectMesa.height - el.offsetTop;
                        const nuevoAlto = Math.min(maxAlto, Math.max(altoMinimo, h0 + dy));
                        el.style.height = nuevoAlto + "px";
                    }
                    function soltar() {
                        document.removeEventListener('pointermove', mover);
                        document.removeEventListener('pointerup', soltar);
                        e.alto = el.offsetHeight;
                        e.tamanoManual = true;
                        el.classList.remove("tarjeta-libre-auto");
                    }
                    document.addEventListener('pointermove', mover);
                    document.addEventListener('pointerup', soltar);
                });
            }
        });
    }

    // Layout especial para REGLAS de VERBOS AUXILIARES (no es el genérico de
    // .tarjetas-grid): columna izquierda angosta, ajustada al contenido, con las
    // primeras 2 tarjetas apiladas ("¿Avoir o être?" y "¿En qué tiempo...?");
    // columna derecha con el resto (la lista de verbos, notas adicionales),
    // ocupando el espacio sobrante. Pensado para que entre todo sin scroll.
    function renderReglasAuxiliares(idioma) {
        const tarjetas = data[idioma]["VERBOS AUXILIARES"];
        const izquierda = tarjetas.slice(0, 2);
        const derecha = tarjetas.slice(2);

        const claseExtra = (t) => (t.ancha ? " tarjeta-ancha" : "") + (t.angosta ? " tarjeta-angosta" : "");

        let html = '<div class="reglas-auxiliares-layout">';
        html += '<div class="reglas-auxiliares-col-izq">';
        izquierda.forEach(tablaData => {
            html += `<div class="tarjeta tarjeta-con-borde${claseExtra(tablaData)}">${renderTabla(tablaData, idioma)}</div>`;
        });
        html += '</div>';
        html += '<div class="reglas-auxiliares-col-der">';
        derecha.forEach(tablaData => {
            html += `<div class="tarjeta tarjeta-con-borde${claseExtra(tablaData)}">${renderTabla(tablaData, idioma)}</div>`;
        });
        html += '</div>';
        html += '</div>';
        return html;
    }

    // Devuelve el HTML interno (sin contenedor) para una unidad + idioma dados,
    // o null si no hay contenido para esa combinación.
    function renderUnidad(idioma, unidadKey) {
        if (unidadKey === "LOS NÚMEROS Y EL TIEMPO") {
            return renderNumerosTiempoNuevo();
        }
        if (unidadKey === "REGLAS") {
            return renderReglas(idioma);
        }
        if (unidadKey === "VOCABULARIO NUEVO") {
            return renderVocabularioNuevo(idioma);
        }
        if (unidadKey === "PARTÍCULAS") {
            return renderParticulas(idioma);
        }
        if (unidadKey === "PERSONAS NUEVO") {
            return renderPersonasNuevo(idioma);
        }
        if (unidadKey === "CULTURA") {
            return renderCultura(idioma);
        }
        if (unidadKey === "LA GEOGRAFÍA Y EL CLIMA") {
            return renderGeografiaClimaNuevo(idioma);
        }
        const unidadData = data[idioma] && data[idioma][unidadKey];
        if (!unidadData) return null;

        if (unidadKey === "TIEMPOS VERBALES") {
            return renderTiemposVerbales(idioma);
        }
        if (unidadKey === "VERBOS AUXILIARES") {
            // Si el auxiliar activo trae "filas" es una conjugación (tarjetas de
            // tiempos); si no, es contenido de REGLAS (layout especial en 2 columnas).
            const esConjugacion = Array.isArray(unidadData) && unidadData.length > 0 && unidadData[0].filas;
            return esConjugacion ? renderTiemposAuxiliar(idioma) : renderReglasAuxiliares(idioma);
        }
        return null; // clave de unidad no reconocida (no debería ocurrir con las unidades vivas)
    }

    function actualizarPantalla() {
        const idioma = document.getElementById('btnIdioma').dataset.idioma;
        const contentTable = document.getElementById('contentTable');
        if (unidadActualKey === null) {
            document.getElementById('mesaDeTarjetas').style.display = "none";
            contentTable.style.display = "";
            contentTable.innerHTML = "<p>Seleccione una unidad para empezar</p>";
            return;
        }
        const html = renderUnidad(idioma, unidadActualKey);
        if (html !== null) {
            contentTable.innerHTML = html;
            return;
        }
        // En VERBOS AUXILIARES, null puede significar "esta posición no existe en
        // este idioma" (ej. ETRE en portugués) en vez de "contenido pendiente".
        if (unidadActualKey === "VERBOS AUXILIARES" && auxiliarActualKey !== "REGLAS" && !(auxiliares[auxiliarActualKey] && auxiliares[auxiliarActualKey][idioma])) {
            contentTable.innerHTML = "<p>Esta posición no existe en este idioma — ver Reglas para más detalle</p>";
            return;
        }
        contentTable.innerHTML = "<p>Contenido en desarrollo...</p>";
    }

    // Mide, para la unidad activa, cuál de los 3 idiomas necesita más ancho,
    // y fija ese ancho en el panel para que no "salte" de tamaño al cambiar idioma.
    function fijarAnchoPanel() {
        const panel = document.querySelector('.content-area');

        // Las unidades en modo pantalla completa (o el lienzo libre) fijan su
        // tamaño por CSS, no por contenido.
        if (unidadesPantallaCompleta.includes(unidadActualKey) || esModoLienzoActivo()) {
            panel.style.width = "";
            return;
        }

        const medidor = document.getElementById('medidorOculto');
        let anchoMaximo = 0;

        ["FRANCÉS", "ITALIANO", "PORTUGUÉS"].forEach(idioma => {
            const html = renderUnidad(idioma, unidadActualKey);
            if (html === null) return;
            medidor.innerHTML = html;
            anchoMaximo = Math.max(anchoMaximo, medidor.scrollWidth);
        });

        if (anchoMaximo > 0) {
            // + padding de #contentTable (4px a cada lado = 8px) para que el contenido
            // respire igual que antes. Ya no hay padding en .content-area: ahora vive
            // en cada tarjeta individual (ver .tarjeta / .tarjeta-con-borde).
            panel.style.width = (anchoMaximo + 8) + "px";
        } else {
            panel.style.width = ""; // sin datos: que vuelva a fit-content
        }
    }

    window.onclick = function(event) {
        if (!event.target.matches('.dropbtn') && !event.target.matches('.flagbtn')) {
            var dropdowns = document.getElementsByClassName("dropdown-content");
            for (var i = 0; i < dropdowns.length; i++) dropdowns[i].classList.remove('show');
        }
    }

    inicializarMenuUnidades();
    inicializarMenuVerbos();
    actualizarVisibilidadSelectorVerbo();
    actualizarModoPantalla();
    fijarAnchoPanel();
    actualizarPantalla();
    inicializarParticulasFondo();
</script>
</body>
</html>
