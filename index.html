<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1366, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Idiomas Zero</title>
<style>

/* =====================================================================
   RESET Y BASE
   iPad Air 13" M2: 1366 × 1024pt en Safari landscape (punto lógico).
   La app es fija — no se adapta a otros tamaños.
===================================================================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Dimensiones fijas */
  --w: 1366px;
  --h: 100dvh;
  --header-h: 72px;
  --mesa-top: 72px;

  /* Paleta neutra */
  --bg-app:        #e9e9e7;
  --bg-header:     #f2f2f0;
  --border-header: #d4d4d2;
  --bg-mesa:       #d8d8d6;

  /* Selectores */
  --sel-bg:        #ffffff;
  --sel-border:    #b8b8b6;
  --sel-radius:    22px;
  --sel-h:         44px;
  --sel-font:      13px;
  --sel-color:     #9a9a98;

  /* Botones editor */
  --btn-size:      44px;
  --btn-bg:        #ffffff;
  --btn-border:    #b8b8b6;
  --btn-active-dot:#aaff00;   /* verde lima fijo — nunca cambia con el idioma */

  /* Tarjetas */
  --card-bg:       #ffffff;
  --card-border:   #c0c0be;
  --card-radius:   16px;
  --card-padding:  16px;
  --card-border-w: 2.5px;

  /* Fuente */
  --font: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
}

html, body {
  width: var(--w);
  height: 100dvh;
  overflow: hidden;
  background: var(--bg-app);
  font-family: var(--font);
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

/* =====================================================================
   BARRA DE HERRAMIENTAS
===================================================================== */
header {
  position: fixed;
  top: 0; left: 0;
  width: var(--w);
  height: var(--header-h);
  background: var(--bg-header);
  border-bottom: 1px solid var(--border-header);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  z-index: 100;
}

/* --- SELECTORES (izquierda) --- */
.selectores {
  display: flex;
  align-items: center;
  gap: 10px;
}

.selector {
  height: var(--sel-h);
  border-radius: var(--sel-radius);
  border: 2px solid var(--sel-border);
  background: var(--sel-bg);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 20px;
  font-size: var(--sel-font);
  color: var(--sel-color);
  font-weight: 500;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: border-color 0.15s;
  white-space: nowrap;
  text-transform: uppercase;
}

/* Ancho mínimo diferenciado — el 1 es el más largo */
.sel-unidad   { min-width: 200px; }
.sel-tema     { min-width: 120px; }
.sel-subtema  { min-width: 100px; }

/* Estado activo (tiene contenido): borde de color, texto oscuro */
.selector.activo {
  border-color: #888886;
  color: #3a3a38;
}

/* --- BOTONES EDICIÓN (derecha) --- */
.botones-edicion {
  display: flex;
  align-items: center;
  gap: 10px;
}

.btn-editor {
  width: var(--btn-size);
  height: var(--btn-size);
  border-radius: 50%;
  border: 2px solid var(--btn-border);
  background: var(--btn-bg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  cursor: pointer;
  position: relative;
  filter: grayscale(100%) opacity(0.5);
  transition: filter 0.15s;
  flex-shrink: 0;
}

/* Prendido */
.btn-editor.activo {
  filter: none;
}

/* Punto verde lima — indicador de activo */
.btn-editor.activo::after {
  content: '';
  position: absolute;
  bottom: 1px;
  right: 1px;
  width: 11px;
  height: 11px;
  border-radius: 50%;
  background: var(--btn-active-dot);
  border: 2px solid #ffffff;
}

/* Deshabilitado (mesa fija) */
.btn-editor.deshabilitado {
  pointer-events: none;
  opacity: 0.25;
  filter: grayscale(100%);
}

/* =====================================================================
   MESA DE TARJETAS
===================================================================== */
.mesa {
  position: fixed;
  top: var(--mesa-top);
  left: 0;
  width: var(--w);
  height: calc(100dvh - var(--mesa-top));
  background: var(--bg-mesa);
  overflow: hidden;
}

/* Estado vacío */
.mesa-vacia {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #aaa;
  font-size: 14px;
  letter-spacing: 0.5px;
}

/* =====================================================================
   TARJETAS
   Regla fija: tamaño definido SOLO por contenido.
   No se pueden redimensionar. No salen de la mesa.
   Aparecen siempre en esquina superior izquierda al activarse.
   El título es la zona de arrastre.
===================================================================== */
.tarjeta {
  position: absolute;
  background: var(--card-bg);
  border-radius: var(--card-radius);
  border: var(--card-border-w) solid var(--card-border);
  display: inline-flex;
  flex-direction: column;
  min-width: 160px;
  max-width: 420px;
}

/* Borde en degradado — se sobreescribe por sub-tema/tema/unidad */
.tarjeta.con-borde-degradado {
  border: none;
  background:
    linear-gradient(var(--card-bg), var(--card-bg)) padding-box,
    linear-gradient(135deg, #c0c0be, #a0a0a0) border-box;
  border: var(--card-border-w) solid transparent;
}

/* Título — zona de arrastre */
.tarjeta-titulo {
  padding: 10px var(--card-padding) 8px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.4px;
  text-transform: uppercase;
  color: #888886;
  border-bottom: 1px solid #ebebeb;
  border-radius: var(--card-radius) var(--card-radius) 0 0;
  cursor: grab;
}

.tarjeta-titulo:active { cursor: grabbing; }

/* Cuerpo de la tarjeta */
.tarjeta-cuerpo {
  padding: var(--card-padding);
}

/* =====================================================================
   TARJETA: COLUMNAS
   Primera columna con color de género (definido por unidad Personas).
   Segunda columna texto neutro.
===================================================================== */
.tarjeta-columnas table {
  border-collapse: collapse;
  font-size: 13px;
  color: #3a3a38;
}
.tarjeta-columnas td {
  padding: 5px 10px 5px 0;
  border-bottom: 1px solid #f0f0ee;
  vertical-align: middle;
}
.tarjeta-columnas td:last-child { padding-right: 0; }
.tarjeta-columnas tr:last-child td { border-bottom: none; }

/* =====================================================================
   TARJETA FIJA (mesa estática — Verbos)
   El grid de 4×2 se define desde afuera con JS/CSS Grid.
===================================================================== */
.mesa-fija {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-template-rows: repeat(2, 1fr);
  gap: 12px;
  padding: 14px 16px;
  width: 100%;
  height: 100%;
  box-sizing: border-box;
}

.tarjeta-fija {
  background: var(--card-bg);
  border-radius: var(--card-radius);
  border: var(--card-border-w) solid var(--card-border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.tarjeta-fija .tarjeta-titulo {
  cursor: default; /* no arrastrable */
}

/* =====================================================================
   MENÚ DESPLEGABLE (selectores al pulsar)
===================================================================== */
.dropdown {
  position: absolute;
  top: calc(var(--header-h) - 4px);
  left: 20px;
  background: #ffffff;
  border: 1.5px solid #c8c8c6;
  border-radius: 14px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.10);
  min-width: 200px;
  z-index: 500;
  overflow: hidden;
  display: none;
}

.dropdown.visible { display: block; }

.dropdown-item {
  padding: 12px 18px;
  font-size: 14px;
  color: #3a3a38;
  cursor: pointer;
  border-bottom: 1px solid #f0f0ee;
  transition: background 0.1s;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.dropdown-item:last-child { border-bottom: none; }
.dropdown-item:hover { background: #f5f5f3; }
.dropdown-item.seleccionado { font-weight: 600; }

</style>
</head>
<body>

<!-- =====================================================================
     BARRA DE HERRAMIENTAS
===================================================================== -->
<header>

  <!-- SELECTORES IZQUIERDA -->
  <div class="selectores">
    <div class="selector sel-unidad" id="selUnidad" onclick="toggleDropdown('dropUnidad')">
      Unidad
    </div>
    <div class="selector sel-tema" id="selTema" onclick="toggleDropdown('dropTema')">
      Tema
    </div>
    <div class="selector sel-subtema" id="selSubtema" onclick="toggleDropdown('dropSubtema')">
      Sub-tema
    </div>
  </div>

  <!-- BOTONES EDICIÓN DERECHA -->
  <div class="botones-edicion">
    <div class="btn-editor deshabilitado" id="btnTarjetas" onclick="abrirTarjetas()" title="Tarjetas">📋</div>
    <div class="btn-editor deshabilitado" id="btnGuardar"  onclick="guardar()"       title="Guardar">💾</div>
    <div class="btn-editor deshabilitado" id="btnLapiz"    onclick="toggleEditor()"  title="Editor">✏️</div>
  </div>

</header>

<!-- DROPDOWNS -->
<div class="dropdown" id="dropUnidad"></div>
<div class="dropdown" id="dropTema"></div>
<div class="dropdown" id="dropSubtema"></div>

<!-- =====================================================================
     MESA DE TARJETAS
===================================================================== -->
<div class="mesa" id="mesa">
  <div class="mesa-vacia" id="mesaVacia">Seleccioná una unidad para empezar</div>
</div>


<!-- =====================================================================
     JAVASCRIPT — LÓGICA BASE
===================================================================== -->
<script>

const estado = {
  unidad:   null,
  tema:     null,
  subtema:  null,
  tipoMesa: null,   // 'libre' | 'fija'
  editor:   false,
  tarjetas: {}      // posiciones guardadas por id de tarjeta
};

// ── Árbol de unidades (placeholder — se carga por idioma) ─────────────
const UNIDADES = {
  'A': {
    nombre: 'Abecedario',
    tipo: 'libre',
    temas: null
  },
  'B': {
    nombre: 'Cultura',
    tipo: 'libre',
    temas: {
      'B1': { nombre: 'Chamonix',    subtemas: null },
      'B2': { nombre: 'Actividades', subtemas: null },
      'B3': { nombre: 'País',        subtemas: null }
    }
  },
  'C': {
    nombre: 'La Geografía y el Clima',
    tipo: 'libre',
    temas: {
      'C1': { nombre: 'Terreno',            subtemas: null },
      'C2': { nombre: 'Flora y Fauna',      subtemas: null },
      'C3': { nombre: 'Clima y Estaciones', subtemas: null },
      'C4': {
        nombre: 'Actividades',
        subtemas: {
          'C4a': { nombre: 'Invierno' },
          'C4b': { nombre: 'Verano' }
        }
      }
    }
  },
  'D': {
    nombre: 'Los Números y el Tiempo',
    tipo: 'libre',
    temas: {
      'D1': { nombre: 'Números',    subtemas: null },
      'D2': { nombre: 'El Tiempo',  subtemas: null }
    }
  },
  'E': {
    nombre: 'Modos y Frases',
    tipo: 'libre',
    temas: {
      'E1': { nombre: 'Imperativo',  subtemas: null },
      'E2': { nombre: 'Subjuntivo',  subtemas: null },
      'E3': { nombre: 'Preguntas',   subtemas: null },
      'E4': { nombre: 'Frases',      subtemas: null }
    }
  },
  'F': {
    nombre: 'Personas',
    tipo: 'libre',
    temas: {
      'F1': { nombre: 'Sujetos',    subtemas: null },
      'F2': { nombre: 'Artículos',  subtemas: null }
    }
  },
  'G': {
    nombre: 'Verbos',
    tipo: 'fija',
    temas: {
      'G1': { nombre: 'Auxiliares',   subtemas: null },
      'G2': { nombre: 'Irregulares',  subtemas: null },
      'G3': { nombre: 'Regulares',    subtemas: null }
    }
  },
  'H': {
    nombre: 'Vocabulario',
    tipo: 'libre',
    temas: null
  }
};

// ── Dropdowns ─────────────────────────────────────────────────────────
function toggleDropdown(id) {
  const todos = document.querySelectorAll('.dropdown');
  const target = document.getElementById(id);
  const yaAbierto = target.classList.contains('visible');
  todos.forEach(d => d.classList.remove('visible'));
  if (!yaAbierto) target.classList.add('visible');
}

// Cerrar al tocar fuera
document.addEventListener('click', e => {
  if (!e.target.closest('.selector') && !e.target.closest('.dropdown')) {
    document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('visible'));
  }
});

// ── Elegir unidad ─────────────────────────────────────────────────────
function elegirUnidad(key, nombre, tipo) {
  estado.unidad  = key;
  estado.tema    = null;
  estado.subtema = null;
  estado.tipoMesa = tipo;

  // Resetear editor al cambiar de unidad
  if (estado.editor) apagarEditor();

  // Actualizar selectores
  const selU = document.getElementById('selUnidad');
  selU.textContent = nombre;
  selU.classList.add('activo');

  document.getElementById('selTema').textContent = 'Tema';
  document.getElementById('selTema').classList.remove('activo');
  document.getElementById('selSubtema').textContent = 'Sub-tema';
  document.getElementById('selSubtema').classList.remove('activo');

  // Llenar dropdown de temas
  const dropTema = document.getElementById('dropTema');
  dropTema.innerHTML = '';
  const u = UNIDADES[key];
  if (u.temas) {
    Object.entries(u.temas).forEach(([k, t]) => {
      const div = document.createElement('div');
      div.className = 'dropdown-item';
      div.textContent = t.nombre;
      div.onclick = () => elegirTema(k, t.nombre);
      dropTema.appendChild(div);
    });
  }

  // Cerrar dropdown
  document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('visible'));

  // Botones: mesa fija → deshabilitados; libre → lápiz disponible
  actualizarBotones();

  // Renderizar mesa
  renderMesa();
}

// ── Elegir tema ───────────────────────────────────────────────────────
function elegirTema(key, nombre) {
  estado.tema    = key;
  estado.subtema = null;

  const selT = document.getElementById('selTema');
  selT.textContent = nombre;
  selT.classList.add('activo');

  document.getElementById('selSubtema').textContent = 'Sub-tema';
  document.getElementById('selSubtema').classList.remove('activo');

  // Sub-temas del tema elegido
  const u = UNIDADES[estado.unidad];
  const t = u.temas[key];
  const dropSub = document.getElementById('dropSubtema');
  dropSub.innerHTML = '';
  if (t.subtemas) {
    Object.entries(t.subtemas).forEach(([k, s]) => {
      const div = document.createElement('div');
      div.className = 'dropdown-item';
      div.textContent = s.nombre;
      div.onclick = () => elegirSubtema(k, s.nombre);
      dropSub.appendChild(div);
    });
  }

  document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('visible'));
  renderMesa();
}

// ── Elegir sub-tema ───────────────────────────────────────────────────
function elegirSubtema(key, nombre) {
  estado.subtema = key;
  const selS = document.getElementById('selSubtema');
  selS.textContent = nombre;
  selS.classList.add('activo');
  document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('visible'));
  renderMesa();
}

// ── Botones de edición ────────────────────────────────────────────────
function actualizarBotones() {
  const esFija = estado.tipoMesa === 'fija';
  ['btnLapiz','btnTarjetas','btnGuardar'].forEach(id => {
    const btn = document.getElementById(id);
    if (esFija) {
      btn.classList.add('deshabilitado');
      btn.classList.remove('activo');
    } else {
      btn.classList.remove('deshabilitado');
    }
  });
}

function toggleEditor() {
  if (estado.tipoMesa === 'fija') return;
  estado.editor = !estado.editor;
  const lapiz    = document.getElementById('btnLapiz');
  const tarjetas = document.getElementById('btnTarjetas');
  const guardar  = document.getElementById('btnGuardar');

  if (estado.editor) {
    lapiz.classList.add('activo');
    tarjetas.classList.add('activo');
    guardar.classList.add('activo');
  } else {
    apagarEditor();
  }
}

function apagarEditor() {
  estado.editor = false;
  ['btnLapiz','btnTarjetas','btnGuardar'].forEach(id => {
    document.getElementById(id).classList.remove('activo');
  });
}

function abrirTarjetas() {
  if (!estado.editor) return;
  // placeholder — aquí se mostrará la lista de tarjetas disponibles
  alert('Tarjetas disponibles (pendiente de contenido)');
}

function guardar() {
  if (!estado.editor) return;
  localStorage.setItem('idiomasZero_estado', JSON.stringify(estado.tarjetas));
  const btn = document.getElementById('btnGuardar');
  btn.textContent = '✅';
  setTimeout(() => { btn.textContent = '💾'; }, 800);
}

// ── Render de mesa ────────────────────────────────────────────────────
function renderMesa() {
  const mesa = document.getElementById('mesa');

  if (!estado.unidad) {
    mesa.innerHTML = '<div class="mesa-vacia">Seleccioná una unidad para empezar</div>';
    return;
  }

  if (estado.tipoMesa === 'fija') {
    renderMesaFija(mesa);
  } else {
    renderMesaLibre(mesa);
  }
}

// Mesa fija: 4×2 placeholders en gris (ejemplo para Verbos)
function renderMesaFija(mesa) {
  mesa.innerHTML = '';
  const grid = document.createElement('div');
  grid.className = 'mesa-fija';

  const titulos = [
    'Tiempo 1','Tiempo 2','Tiempo 3','Tiempo 4',
    'Tiempo 5','Tiempo 6','Tiempo 7','Tiempo 8'
  ];

  titulos.forEach(t => {
    const card = document.createElement('div');
    card.className = 'tarjeta-fija';
    card.innerHTML = `
      <div class="tarjeta-titulo">${t}</div>
      <div class="tarjeta-cuerpo" style="flex:1; display:flex; align-items:center; justify-content:center; color:#ccc; font-size:12px;">
        contenido
      </div>`;
    grid.appendChild(card);
  });

  mesa.appendChild(grid);
}

// Mesa libre: tarjetas arrastrables, aparecen en esquina sup izq
function renderMesaLibre(mesa) {
  mesa.innerHTML = '<div class="mesa-vacia" style="opacity:0.4">Mesa lista — activá el editor para agregar tarjetas</div>';
  // Las tarjetas reales se agregan desde abrirTarjetas() con su posición guardada
}

// ── Arrastre de tarjetas ──────────────────────────────────────────────
// Se aplica al título de cada tarjeta en mesa libre
function activarArrastre(tarjeta, id) {
  const titulo = tarjeta.querySelector('.tarjeta-titulo');
  if (!titulo) return;

  titulo.addEventListener('pointerdown', ev => {
    if (!estado.editor) return;
    ev.preventDefault();
    tarjeta.style.zIndex = 50;
    const mesa = document.getElementById('mesa');
    const rectMesa = mesa.getBoundingClientRect();
    const rectCard = tarjeta.getBoundingClientRect();

    const ox = ev.clientX - rectCard.left;
    const oy = ev.clientY - rectCard.top;
    const maxX = rectMesa.width  - rectCard.width;
    const maxY = rectMesa.height - rectCard.height;

    function mover(ev2) {
      const nx = Math.min(Math.max(0, ev2.clientX - rectMesa.left - ox), maxX);
      const ny = Math.min(Math.max(0, ev2.clientY - rectMesa.top  - oy), maxY);
      tarjeta.style.left = nx + 'px';
      tarjeta.style.top  = ny + 'px';
    }
    function soltar() {
      document.removeEventListener('pointermove', mover);
      document.removeEventListener('pointerup', soltar);
      estado.tarjetas[id] = {
        left: parseInt(tarjeta.style.left),
        top:  parseInt(tarjeta.style.top)
      };
    }

    document.addEventListener('pointermove', mover);
    document.addEventListener('pointerup', soltar);
  });
}

// ── Inicialización al cargar ──────────────────────────────────────────
function iniciarDropdownUnidades() {
  const drop = document.getElementById('dropUnidad');
  drop.innerHTML = '';
  Object.entries(UNIDADES).forEach(([key, u]) => {
    const div = document.createElement('div');
    div.className = 'dropdown-item';
    div.textContent = u.nombre;
    div.onclick = () => elegirUnidad(key, u.nombre, u.tipo);
    drop.appendChild(div);
  });
}

iniciarDropdownUnidades();

</script>
</body>
</html>
